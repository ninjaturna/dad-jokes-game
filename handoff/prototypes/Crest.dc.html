<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<svg viewBox="0 0 240 256" width="{{ size }}" style="display:block;overflow:visible">
  <circle cx="120" cy="116" r="96" fill="none" stroke="{{ ring }}" stroke-width="{{ ringWidth }}"></circle>
  <sc-if value="{{ double }}" hint-placeholder-val="{{ true }}">
    <circle cx="120" cy="116" r="84.5" fill="none" stroke="{{ ring }}" stroke-width="0.75" opacity="0.5"></circle>
  </sc-if>
  <text x="120" y="63" text-anchor="middle" fill="{{ accent }}" style="font-family:'Hanken Grotesk',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.3em"></text>
  <g transform="translate(120,103)">
    <path d="M-26,-1 Q0,-28 26,-1" fill="none" stroke="{{ vine }}" stroke-width="1.75" stroke-linecap="round"></path>
    <ellipse cx="-17" cy="8" rx="3.4" ry="7.6" transform="rotate(-18 -17 8)" fill="{{ vine }}"></ellipse>
    <ellipse cx="0" cy="13" rx="3.5" ry="8.2" fill="{{ vine }}"></ellipse>
    <ellipse cx="17" cy="8" rx="3.4" ry="7.6" transform="rotate(18 17 8)" fill="{{ vine }}"></ellipse>
    <ellipse cx="-9" cy="4.5" rx="2.5" ry="5.8" transform="rotate(-22 -9 4.5)" fill="{{ leaf }}"></ellipse>
    <ellipse cx="9" cy="4.5" rx="2.5" ry="5.8" transform="rotate(22 9 4.5)" fill="{{ leaf }}"></ellipse>
  </g>
  <sc-if value="{{ showWord }}" hint-placeholder-val="{{ true }}">
    <text x="120" y="61" text-anchor="middle" fill="{{ accent }}" style="font-family:'Hanken Grotesk',sans-serif;font-size:9px;font-weight:700;letter-spacing:0.3em">BLACK CAFE</text>
    <text x="121" y="158" text-anchor="middle" fill="{{ ink }}" style="font-family:'Archivo',sans-serif;font-size:25px;font-weight:600;letter-spacing:0.12em">MARLY’S</text>
    <text x="124" y="182" text-anchor="middle" fill="{{ accent }}" style="font-family:'Archivo',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.5em">YARD</text>
  </sc-if>
</svg>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:260,&quot;height&quot;:280},&quot;size&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:240,&quot;tsType&quot;:&quot;number&quot;},&quot;ring&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#A67244&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;ringWidth&quot;:{&quot;editor&quot;:&quot;float&quot;,&quot;default&quot;:1.5,&quot;tsType&quot;:&quot;number&quot;},&quot;ink&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#F2E4D6&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#C98A4E&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;vine&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#5DCAA5&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;leaf&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#3E8E72&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;top&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;BLACK CAFE&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;double&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showWord&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props;
    return {
      size: p.size ?? 240,
      ring: p.ring ?? '#A67244',
      ringWidth: p.ringWidth ?? 1.5,
      ink: p.ink ?? '#F2E4D6',
      accent: p.accent ?? '#C98A4E',
      vine: p.vine ?? '#5DCAA5',
      leaf: p.leaf ?? '#3E8E72',
      top: p.top ?? 'BLACK CAFE',
      double: p.double ?? true,
      showWord: p.showWord ?? true,
    };
  }
}
</script>
</body>
</html>
