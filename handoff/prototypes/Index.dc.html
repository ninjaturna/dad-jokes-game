<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700;800;900&family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#260306}
  :root,[data-theme="dark"]{
    --p-bg:#260306; --p-surface:#3A0A12; --p-surface-2:#481427;
    --p-text:#F2E4D6; --p-text-2:#D8C7B6; --p-muted:#C98A4E;
    --p-accent:#D96B43; --p-accent-2:#5DCAA5; --p-border:#5A3326;
    --p-candle:#E0A867; --p-shadow:0 12px 30px rgba(12,1,3,.5);
  }
  [data-theme="light"]{
    --p-bg:#F5EFE7; --p-surface:#FFFFFF; --p-surface-2:#F3E9E0;
    --p-text:#260306; --p-text-2:#733122; --p-muted:#8A6A4A;
    --p-accent:#A62F24; --p-accent-2:#315955; --p-border:#E4D7CB;
    --p-candle:#A67244; --p-shadow:0 12px 28px rgba(38,3,6,.10);
  }
  @keyframes my-glow{0%,100%{opacity:.5}50%{opacity:.8}}
  ::selection{background:var(--p-accent);color:#fff}
</style>
</helmet>

<div data-theme="{{ theme }}" style="background:var(--p-bg);color:var(--p-text);font-family:'Hanken Grotesk',sans-serif;min-height:100vh;position:relative;transition:background .5s ease,color .5s ease;-webkit-font-smoothing:antialiased;overflow-x:hidden">

  <div style="position:fixed;inset:0;pointer-events:none;z-index:50;opacity:.05;mix-blend-mode:overlay;background-image:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22160%22 height=%22160%22><filter id=%22n%22><feTurbulence type=%22fractalNoise%22 baseFrequency=%220.8%22 numOctaves=%222%22/></filter><rect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23n)%22/></svg>')"></div>

  <div style="display:flex;justify-content:flex-end;padding:16px 28px">
    <button onClick="{{ toggleTheme }}" style="cursor:pointer;display:flex;align-items:center;gap:7px;background:transparent;color:var(--p-text-2);border:1px solid var(--p-border);border-radius:999px;padding:7px 14px;font-family:'Hanken Grotesk';font-size:12px;font-weight:600"><span style="width:8px;height:8px;border-radius:50%;background:var(--p-candle)"></span>{{ themeLabel }}</button>
  </div>

  <!-- hero -->
  <header style="position:relative;text-align:center;padding:24px 28px 44px">
    <div style="position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:620px;height:380px;background:radial-gradient(ellipse at center, color-mix(in srgb,var(--p-candle) 30%, transparent), transparent 70%);filter:blur(22px);animation:my-glow 8s ease-in-out infinite;pointer-events:none"></div>
    <div style="position:relative;display:flex;justify-content:center;margin-bottom:18px"><dc-import name="Crest" size="92" showWord="{{ false }}" hint-size="92px,92px"></dc-import></div>
    <div style="position:relative;font-size:11px;letter-spacing:.34em;color:var(--p-candle);font-weight:600;margin-bottom:16px">PRODUCT &amp; BRAND · SCREEN INDEX</div>
    <h1 style="position:relative;font-family:'Archivo';font-weight:800;font-size:clamp(34px,6vw,54px);letter-spacing:-.02em;margin:0">Black Cafe <span style="font-weight:300;color:var(--p-text-2)">@ Marly’s Yard</span></h1>
    <p style="position:relative;max-width:480px;margin:14px auto 0;font-size:16px;color:var(--p-text-2);line-height:1.6">Every screen in the system. Dark by default — flip the toggle to preview light. Tap any card to open it.</p>
  </header>

  <div style="max-width:1040px;margin:0 auto;padding:0 28px 90px;display:flex;flex-direction:column;gap:38px">
    <sc-for list="{{ groups }}" as="grp" hint-placeholder-count="4">
      <section>
        <div style="display:flex;align-items:baseline;gap:14px;margin-bottom:16px">
          <h2 style="font-family:'Archivo';font-weight:700;font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:var(--p-muted);margin:0">{{ grp.title }}</h2>
          <span style="flex:1;height:1px;background:var(--p-border)"></span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:14px">
          <sc-for list="{{ grp.items }}" as="it" hint-placeholder-count="4">
            <a href="{{ it.href }}" style="text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:9px;background:var(--p-surface);border:1px solid var(--p-border);border-radius:13px;padding:18px 19px;box-shadow:var(--p-shadow)" style-hover="border-color:var(--p-accent)">
              <span style="width:30px;height:30px;border-radius:8px;background:{{ it.tint }};display:flex;align-items:center;justify-content:center;font-size:15px">{{ it.icon }}</span>
              <span style="font-family:'Archivo';font-weight:700;font-size:16px;letter-spacing:-.01em;margin-top:3px">{{ it.name }}</span>
              <span style="font-size:12.5px;color:var(--p-text-2);line-height:1.45">{{ it.desc }}</span>
            </a>
          </sc-for>
        </div>
      </section>
    </sc-for>
  </div>

  <footer style="border-top:1px solid var(--p-border)"><div style="max-width:1040px;margin:0 auto;padding:26px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:11px"><dc-import name="Crest" size="34" showWord="{{ false }}" double="{{ false }}" ringWidth="{{ 1.25 }}" hint-size="34px,34px"></dc-import><span style="font-family:'Archivo';font-weight:700;font-size:13px;letter-spacing:.16em">BLACK CAFE <span style="color:var(--p-muted)">@ MARLY’S YARD</span></span></div>
    <span style="font-size:12px;color:var(--p-muted)">blackcafe.miami · Miami · est. 2026</span>
  </div></footer>
</div>

<template id="__bundler_thumbnail" data-bg-color="#260306">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#260306"></rect>
    <circle cx="600" cy="385" r="150" fill="none" stroke="#A67244" stroke-width="5"></circle>
    <circle cx="600" cy="385" r="132" fill="none" stroke="#A67244" stroke-width="2" opacity="0.5"></circle>
    <path d="M524,405 Q600,288 676,405" fill="none" stroke="#5DCAA5" stroke-width="9" stroke-linecap="round"></path>
    <ellipse cx="556" cy="430" rx="13" ry="28" transform="rotate(-18 556 430)" fill="#5DCAA5"></ellipse>
    <ellipse cx="600" cy="442" rx="13" ry="30" fill="#5DCAA5"></ellipse>
    <ellipse cx="644" cy="430" rx="13" ry="28" transform="rotate(18 644 430)" fill="#5DCAA5"></ellipse>
    <text x="600" y="300" text-anchor="middle" fill="#C98A4E" font-family="Georgia, serif" font-size="26" letter-spacing="11">BLACK CAFE</text>
    <text x="600" y="510" text-anchor="middle" fill="#F2E4D6" font-family="Georgia, serif" font-size="62" font-weight="bold" letter-spacing="7">MARLY’S</text>
    <text x="600" y="556" text-anchor="middle" fill="#E0A867" font-family="Georgia, serif" font-size="30" letter-spacing="26">YARD</text>
  </svg>
</template></x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1040,&quot;height&quot;:900},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;dark&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { theme:'dark' };
  componentDidMount(){ if(this.props.defaultTheme && this.props.defaultTheme!==this.state.theme) this.setState({theme:this.props.defaultTheme}); }
  renderVals(){
    const s=this.state;
    const t1='color-mix(in srgb,var(--p-accent) 22%, transparent)';
    const t2='color-mix(in srgb,var(--p-accent-2) 22%, transparent)';
    const t3='color-mix(in srgb,var(--p-candle) 24%, transparent)';
    const groups=[
      {title:'Guest-facing', items:[
        {name:'Landing',href:'Landing.dc.html',icon:'🌿',tint:t2,desc:'“The Yard” — hero, upcoming gatherings, get on the list.'},
        {name:'Event Page',href:'Event Page.dc.html',icon:'✦',tint:t1,desc:'The invitation, with live RSVP and details.'},
        {name:'RSVP Flow',href:'RSVP Flow.dc.html',icon:'✓',tint:t2,desc:'Frictionless 3-step reply, no account.'},
        {name:'Video Invite',href:'Video Invites.dc.html',icon:'▶',tint:t1,desc:'Recorded welcome that plays in the invite.'},
      ]},
      {title:'Host tools', items:[
        {name:'Dashboard',href:'Host Dashboard.dc.html',icon:'◧',tint:t1,desc:'Gatherings at a glance, RSVP status, quick actions.'},
        {name:'Create Event',href:'Create Event.dc.html',icon:'＋',tint:t1,desc:'Basics, tags, guests, pages, polls, share link.'},
        {name:'Manage Event',href:'Manage Event.dc.html',icon:'⚙',tint:t3,desc:'Edit + notify, date poll, potluck, add-to-calendar.'},
        {name:'Guests',href:'Guests.dc.html',icon:'☺',tint:t2,desc:'Contact lists, add-to-list, approval queue.'},
        {name:'Send Invites',href:'Send Invites.dc.html',icon:'✉',tint:t1,desc:'Email/SMS, design picker, QR, recipient lists.'},
        {name:'Info Pages',href:'Info Pages.dc.html',icon:'☰',tint:t3,desc:'Itinerary, menu, track list, games — attached pages.'},
        {name:'Ticketing',href:'Ticketing.dc.html',icon:'$',tint:t1,desc:'Paid tiers + guest checkout with fee math.'},
        {name:'Settings',href:'Settings.dc.html',icon:'⚑',tint:t3,desc:'Reminders, recurring, privacy, notifications.'},
      ]},
      {title:'Community', items:[
        {name:'Community',href:'Community.dc.html',icon:'❖',tint:t2,desc:'Persistent space — feed/chat, photos, shared playlist.'},
      ]},
      {title:'Foundation', items:[
        {name:'Design System',href:'Marlys Yard Design System.dc.html',icon:'◐',tint:t3,desc:'Logo, tokens, type scale, components, two registers.'},
        {name:'Crest',href:'Crest.dc.html',icon:'❀',tint:t2,desc:'The reusable vine badge, all lockups.'},
      ]},
    ];
    return {
      theme:s.theme, themeLabel:s.theme==='dark'?'Dark':'Light',
      toggleTheme:()=>this.setState(p=>({theme:p.theme==='dark'?'light':'dark'})),
      groups,
    };
  }
}
</script>
</body>
</html>
